anchor=top-right
default-timeout=5000
width=420
outer-margin=20
padding=10
border-size=2
max-icon-size=32
font=JetBrains Mono NF 14px

text-color=#d3c6aa
border-color=#A7C080
background-color=#2d353b

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false

[urgency=critical]
default-timeout=0
layer=overlay

[summary~="Screenshot copied & saved"]
max-icon-size=80
format=<b>%s</b>\n%b
