exec-once = bash -c '[ -f "$HOME/.cache/hyprkarl-caffeine" ] || uwsm-app -- hypridle'
exec-once = uwsm-app -- mako
exec-once = uwsm app -- systemctl --user start hyprpolkitagent
exec-once = uwsm app -- waybar
exec-once = uwsm app -- swayosd-server
exec-once = uwsm app -- hyprpaper
exec-once = hyprkarl-wallpaper-init

# Prod swayosd to fix sluggish initial response
exec-once = while ! swayosd-client --custom-message "" 2>/dev/null; do sleep 0.2; done