name: searxng

services:
  searxng:
    image: docker.io/searxng/searxng:latest
    depends_on:
      - valkey
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./searxng:/etc/searxng
      - searxng-cache:/var/cache/searxng
    restart: unless-stopped
    networks:
      - searxng
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.searxng.rule=Host(`searxng.local`)"
      - "traefik.http.routers.searxng.entrypoints=web"
      - "traefik.http.services.searxng.loadbalancer.server.port=8080"

  valkey:
    image: docker.io/valkey/valkey:9-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - valkey-data:/data
    networks:
      - searxng

volumes:
  searxng-cache:
  valkey-data:

networks:
  searxng:
  traefik-proxy:
    external: true
