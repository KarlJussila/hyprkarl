$terminal = uwsm app -- xdg-terminal-exec
$terminal-alt = uwsm app -- foot
$browser = hk-launch-browser

bindd = SUPER, RETURN, Terminal, exec, $terminal --dir="$(hk-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Alternative terminal, exec, $terminal-alt
bindd = SUPER SHIFT, F, File manager, exec, $terminal --app-id=org.hyprkarl.terminal yazi "$(hk-terminal-cwd)"
bindd = SUPER ALT, F, Alternative file manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER SHIFT, B, Browser, exec, $browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --private
bindd = SUPER SHIFT, E, Editor, exec, hk-launch-editor

bindd = SUPER SHIFT, D, Dictionary, exec, $terminal --app-id=TUI.float -e hk-dictionary