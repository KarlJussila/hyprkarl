HYPRKARL_DOCKER_SERVICE_ID="kiwix"
HYPRKARL_DOCKER_SERVICE_LABEL="Kiwix"
HYPRKARL_DOCKER_SERVICE_INSTALL_DIR="$HOME/.kiwix"
HYPRKARL_DOCKER_SERVICE_COMPOSE_FILE="docker-compose.yml"
HYPRKARL_DOCKER_SERVICE_HOSTS_ENTRY="127.0.0.1 kiwix.local"
HYPRKARL_DOCKER_SERVICE_REQUIRE_TRAEFIK_NETWORK=1
HYPRKARL_DOCKER_SERVICE_INSTALL_MESSAGE="Kiwix is available at http://kiwix.local (requires Traefik) or http://localhost:8888"
HYPRKARL_DOCKER_SERVICE_INSTALL_WARNING="Place ZIM files in $HOME/.kiwix/data to make them available. Kiwix will restart repeatedly until a ZIM file is present."
HYPRKARL_DOCKER_SERVICE_REMOVE_WARNING="This will stop the Kiwix container and permanently delete all data in $HOME/.kiwix."
HYPRKARL_DOCKER_SERVICE_TEMPLATE_FILES=(
  "docker-compose.yml:docker-compose.yml"
)
HYPRKARL_DOCKER_SERVICE_DATA_DIRS=(
  "data"
)
