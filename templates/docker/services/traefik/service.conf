HYPRKARL_DOCKER_SERVICE_ID="traefik"
HYPRKARL_DOCKER_SERVICE_LABEL="Traefik"
HYPRKARL_DOCKER_SERVICE_INSTALL_DIR="$HOME/.traefik"
HYPRKARL_DOCKER_SERVICE_COMPOSE_FILE="docker-compose.yml"
HYPRKARL_DOCKER_SERVICE_REQUIRE_TRAEFIK_NETWORK=1
HYPRKARL_DOCKER_SERVICE_INSTALL_MESSAGE="Traefik is running and will automatically route .local hostnames."
HYPRKARL_DOCKER_SERVICE_REMOVE_WARNING="This will remove .local hostnames for other containers. Services will still be accessible via localhost:PORT."
HYPRKARL_DOCKER_SERVICE_TEMPLATE_FILES=(
  "docker-compose.yml:docker-compose.yml"
)
