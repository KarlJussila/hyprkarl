[[opener.open-with]]
run    = "$HYPRKARL_PATH/bin/hk-open-with %s1"
for    = "linux"
orphan = true
desc   = "Open with..."

[[opener.set-wallpaper]]
run  = "hk-wallpaper add %s1"
for  = "linux"
desc = "Set as wallpaper"

[open]
rules = [
  { url = "*/", use = [ "edit", "open", "reveal" ] },
  { mime = "text/*", use = [ "edit", "open-with", "reveal" ] },
  { mime = "image/*", use = [ "open", "open-with", "reveal", "set-wallpaper" ] },
  { mime = "{audio,video}/*", use = [ "play", "open-with", "reveal" ] },
  { mime = "application/{json,ndjson,javascript,wine-extension-ini}", use = [ "edit", "open-with", "reveal" ] },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "open-with", "reveal" ] },
  { mime = "inode/empty", use = [ "edit", "open-with", "reveal" ] },
  { mime = "vfs/{absent,stale}", use = "download" },
  { url = "*", use = [ "open", "open-with", "reveal" ] },
]
