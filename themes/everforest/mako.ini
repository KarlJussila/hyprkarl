anchor=top-right
default-timeout=5000
width=420
outer-margin=20
padding=10
border-size=2
max-icon-size=32
font=JetBrains Mono NF 14px
icon-path=~/.config/hyprkarl/current/theme/icons/

text-color=#d3c6aa
border-color=#a7c080
background-color=#3D484D
progress-color=#678140

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false

[urgency=critical]
default-timeout=0
layer=overlay

[summary~="Screenshot copied & saved"]
max-icon-size=80
format=<b>%s</b>\n%b

[app-name=osd-volume]
anchor=bottom-center
default-timeout=2000
width=300
outer-margin=40
format=<b>%s</b> %b
max-icon-size=16

[app-name=osd-brightness]
anchor=bottom-center
default-timeout=2000
width=300
outer-margin=40
format=<b>%s</b> %b
max-icon-size=16

[app-name=osd-player]
anchor=bottom-center
default-timeout=3000
width=300
outer-margin=40
format=<b>%s</b>\n%b
