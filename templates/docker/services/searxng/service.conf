HYPRKARL_DOCKER_SERVICE_ID="searxng"
HYPRKARL_DOCKER_SERVICE_LABEL="SearXNG"
HYPRKARL_DOCKER_SERVICE_INSTALL_DIR="$HOME/.searxng"
HYPRKARL_DOCKER_SERVICE_COMPOSE_FILE="docker-compose.yaml"
HYPRKARL_DOCKER_SERVICE_HOSTS_ENTRY="127.0.0.1 searxng.local"
HYPRKARL_DOCKER_SERVICE_REQUIRE_TRAEFIK_NETWORK=1
HYPRKARL_DOCKER_SERVICE_INSTALL_MESSAGE="SearXNG is available at http://searxng.local (requires Traefik) or http://localhost:8080"
HYPRKARL_DOCKER_SERVICE_REMOVE_WARNING="This will stop the SearXNG stack and permanently delete all configuration in $HOME/.searxng. Cached data and Valkey storage are removed through docker compose down --volumes."
HYPRKARL_DOCKER_SERVICE_TEMPLATE_FILES=(
  "docker-compose.yaml:docker-compose.yaml"
  "searxng/settings.yml:searxng/settings.yml"
)
HYPRKARL_DOCKER_SERVICE_PRESERVE_FILES=(
  "searxng/settings.yml"
)
