exec-once = bash -c '[ -f "$HOME/.cache/hyprkarl-caffeine" ] || uwsm-app -- hypridle'
exec-once = uwsm-app -- mako
exec-once = uwsm app -- systemctl --user start hyprpolkitagent
exec-once = uwsm app -- waybar
exec-once = uwsm app -- swayosd-server
exec-once = uwsm app -- hyprpaper
exec-once = hyprkarl-wallpaper-init || hyprkarl-wallpaper-cycle

# Slow app launch fix -- set systemd vars
exec-once = systemctl --user import-environment $(env | cut -d'=' -f 1)
exec-once = dbus-update-activation-environment --systemd --all

# swayosd-server keepalive to fix cold-start issues
exec-once = systemctl --user start swayosd-keepalive.timer